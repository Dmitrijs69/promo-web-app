<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эксклюзивные Промокоды</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f3f4f6);
            color: var(--tg-theme-text-color, #222);
            margin: 0;
            padding: 16px;
        }
        .offer-card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .brand {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 4px;
        }
        .title {
            color: var(--tg-theme-hint-color, #666);
            font-size: 0.9em;
            margin-bottom: 12px;
        }
        .promo-code {
            background: #eef2ff;
            color: #4f46e5;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 1.1em;
            font-weight: bold;
            display: inline-block;
            border: 1px dashed #4f46e5;
        }
        .discount {
            float: right;
            background: #10b981;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="offers-container"></div>

<script>
    // Инициализация Web App в Telegram
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();

    // Наша "база данных" купонов теперь живет прямо здесь
    const offers = [
        {
            brand_name: "Яндекс Еда",
            title: "Скидка на первый заказ",
            description: "Скидка для новых пользователей на заказы от 1000 руб.",
            promocode: "YANDEX500",
            discount_value: "500 руб"
        }
    ];

    const container = document.getElementById('offers-container');

    // Отрисовка купонов
    offers.forEach(offer => {
        const card = document.createElement('div');
        card.className = 'offer-card';
        card.innerHTML = `
            <div class="discount">${offer.discount_value}</div>
            <div class="brand">${offer.brand_name}</div>
            <div class="title">${offer.title}</div>
            <p style="font-size: 0.9em; margin-bottom: 12px;">${offer.description}</p>
            <div class="promo-code">${offer.promocode}</div>
        `;
        container.appendChild(card);
    });
</script>
</body>
</html>
