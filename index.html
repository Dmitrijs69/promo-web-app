<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Эксклюзивные Промокоды</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Стиль контейнера для карточек */
        #promo-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Карточка купона */
        .card {
            background-color: var(--secondary-bg);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 700;
        }

        .discount-badge {
            background-color: #05b46a;
            color: #ffffff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
        }

        .promo-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 4px;
        }

        .promo-desc {
            font-size: 13px;
            color: var(--hint-color);
            margin-bottom: 16px;
            line-height: 1.4;
        }

        /* Кнопка скопировать + перейти */
        .action-btn {
            display: block;
            width: 100%;
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: opacity 0.2s;
        }

        .action-btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="promo-list"></div>
    </div>

    <script>
        // Инициализируем Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Расширяем на максимум экрана

        // Функция загрузки данных
        async function loadPromoCodes() {
            const promoList = document.getElementById('promo-list');
            try {
                // Добавляем случайный параметр (кэшбрейкер), чтобы браузер всегда скачивал свежий файл
                const response = await fetch(`data.json?v=${Date.now()}`);
                if (!response.ok) throw new Error('Ошибка загрузки данных');
                
                const promos = await response.json();
                promoList.innerHTML = ''; // Очищаем контейнер

                // Перебираем массив промокодов и строим HTML
                promos.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="brand-name">${item.brand}</span>
                            <span class="discount-badge">${item.discount}</span>
                        </div>
                        <div class="promo-title">${item.title}</div>
                        <div class="promo-desc">${item.description}</div>
                        <button class="action-btn" onclick="handlePromoClick('${item.code}', '${item.link}')">
                            Получить: ${item.code}
                        </button>
                    `;
                    promoList.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                promoList.innerHTML = '<div style="text-align:center; color:var(--hint-color);">Не удалось загрузить промокоды...</div>';
            }
        }

        // Функция обработки клика (копирование + переход)
        function handlePromoClick(code, link) {
            // 1. Копируем код в буфер обмена
            navigator.clipboard.writeText(code).then(() => {
                // Включаем легкую вибрацию на телефоне (нативно для Telegram)
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('success');
                }

                // Показываем красивое всплывающее уведомление внутри Telegram
                tg.showPopup({
                    title: 'Промокод скопирован!',
                    message: `Код "${code}" сохранен. Сейчас мы откроем сайт сервиса, вставьте его при оформлении заказа.`,
                    buttons: [{id: 'ok', type: 'default', text: 'Отлично'}]
                }, function() {
                    // 2. После закрытия окна открываем партнерскую ссылку внутри Telegram
                    if (link.startsWith('http')) {
                        tg.openLink(link);
                    }
                });
            }).catch(err => {
                // Если буфер не сработал, просто открываем ссылку
                if (link.startsWith('http')) tg.openLink(link);
            });
        }

        // Запускаем загрузку при старте страницы
        loadPromoCodes();
    </script>
</body>
</html>
