<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эксклюзивные Промокоды</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #181818);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }
        .card {
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2c);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .brand {
            font-weight: bold;
            font-size: 16px;
        }
        .discount {
            background-color: #4CAF50;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .desc {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #aaaaaa);
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .btn {
            display: block;
            width: 100%;
            background-color: var(--tg-theme-button-color, #8a2be2);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
        }
        #error-log {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 20px;
            padding: 10px;
            background: rgba(255,0,0,0.1);
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>

<div id="coupons">
    <p style="text-align:center; color:#888;">Загрузка промокодов...</p>
</div>
<div id="error-log"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const couponsContainer = document.getElementById('coupons');
    const errorLog = document.getElementById('error-log');

    // Относительный путь! Ищет файл строго в той же папке, где лежит index.html
    fetch('data.json')
        .then(response => {
            if (!response.ok) {
                throw new Error(`Ошибка сети: ${response.status} ${response.statusText}`);
            }
            return response.json();
        })
        .then(data => {
            couponsContainer.innerHTML = '';
            
            if (!Array.isArray(data) || data.length === 0) {
                couponsContainer.innerHTML = '<p style="text-align:center;">Офферы пока загружаются. Зайдите позже!</p>';
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="header">
                        <div class="brand">${item.brand || 'Магазин'}</div>
                        <div class="discount">${item.discount || '%'}</div>
                    </div>
                    <div class="title">${item.title || 'Скидка'}</div>
                    <div class="desc">${item.description || ''}</div>
                    <button class="btn" onclick="copyAndRedirect('${item.code}', '${item.link}')">
                        Получить: ${item.code || 'CODE'}
                    </button>
                `;
                couponsContainer.appendChild(card);
            });
        })
        .catch(error => {
            couponsContainer.innerHTML = '';
            errorLog.style.display = 'block';
            errorLog.innerHTML = `<b>Техническая ошибка:</b><br>Не удалось загрузить офферы из data.json.<br><br><i>Детали: ${error.message}</i>`;
        });

    function copyAndRedirect(code, link) {
        if (!link || link === "undefined") return;
        
        navigator.clipboard.writeText(code).then(() => {
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                tg.openLink(link);
            } else {
                window.open(link, '_blank');
            }
        }).catch(() => {
            window.location.href = link;
        });
    }
</script>
</body>
</html>
