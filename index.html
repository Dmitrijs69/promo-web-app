<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эксклюзивные Промокоды</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #181818;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        #coupons-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .coupon-card {
            background-color: #242424;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .brand {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
        }

        .discount {
            background-color: #00c853;
            color: #ffffff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 4px;
        }

        .card-desc {
            font-size: 13px;
            color: #aaaaaa;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .action-btn {
            background-color: #7b68ee;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
            width: 100%;
        }

        .action-btn:active {
            background-color: #6a5acd;
        }

        .no-data {
            text-align: center;
            color: #888;
            margin-top: 50px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="coupons-container">
        </div>

    <script>
        // Инициализируем Telegram Web App API
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.ready();
            tg.expand(); // Разворачиваем окно на максимум внутри Telegram
        }

        async function loadCoupons() {
            const container = document.getElementById('coupons-container');
            
            try {
                // Хитрый трюк: добавляем ?v=ВРЕМЯ, чтобы GitHub Pages не кэшировал файл старыми данными
                const response = await fetch('data.json?v=' + Date.now());
                if (!response.ok) throw new Error('Файл данных не найден');
                
                const coupons = await response.json();
                container.innerHTML = '';

                if (!coupons || coupons.length === 0) {
                    container.innerHTML = '<div class="no-data">🔥 Новые промокоды появятся совсем скоро!</div>';
                    return;
                }

                // Перебираем массив купонов и строим HTML-структуру
                coupons.forEach(coupon => {
                    const card = document.createElement('div');
                    card.className = 'coupon-card';
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="brand">${coupon.brand}</span>
                            <span class="discount">${coupon.discount}</span>
                        </div>
                        <div class="card-title">${coupon.title}</div>
                        <div class="card-desc">${coupon.description}</div>
                        <button class="action-btn" onclick="handleCouponClick('${coupon.code}', '${coupon.link}')">
                            Получить: ${coupon.code}
                        </button>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Ошибка загрузки купонов:', error);
                container.innerHTML = '<div class="no-data">❌ Не удалось загрузить промокоды. Попробуйте позже.</div>';
            }
        }

        function handleCouponClick(code, link) {
            // Копируем промокод в буфер обмена пользователя
            navigator.clipboard.writeText(code).then(() => {
                
                // Включаем легкую вибрацию на телефоне (если открыто внутри Telegram)
                if (tg && tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('success');
                }

                alert('🔥 Промокод ' + code + ' скопирован в буфер обмена! Сейчас откроется сайт магазина.');

                // Перенаправляем пользователя по реферальной ссылке
                if (tg && tg.openLink) {
                    tg.openLink(link); // Открытие внутри встроенного браузера Telegram
                } else {
                    window.open(link, '_blank'); // Обычное открытие, если тестируешь в браузере на ПК
                }
            }).catch(err => {
                console.error('Ошибка копирования:', err);
                // Если буфер обмена заблокирован, всё равно открываем ссылку
                if (tg && tg
